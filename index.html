<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Crescendo</title>
        <link rel="icon" type="image/x-icon" href="Images/crescendo_icon.png" />

        <!-- Tailwind CSS -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style type="text/tailwindcss">
            
            /* prevents bugs with the audio slider */
            #now-playing-el {
                user-select: none;
            }

            /* base styling for audio slider */
            input[type="range"] {
            	font-size: 1.5rem;
            	width: 60%;
            	color: #154CEA;
            
            	--thumb-height: 0.5em; /* size of the circle */
            	--track-height: 0.125em; /* thickness of the line */
            	--track-color: rgba(0, 0, 0, 0.2); /* background track color */
            
            	--brightness-hover: 130%;
            	--brightness-down: 110%;
            
            	position: relative;
            	background: transparent;
            	overflow: visible;

            	filter: brightness(100%);
            }

            /* modifications for hover, active, and disabled */
            input[type="range"]:hover {
            	--thumb-height: 0.75em;
            	--track-height: 0.18em;
                cursor: pointer;
            	filter: brightness(var(--brightness-hover));
            }

            input[type="range"]:active {
            	cursor: pointer;
            	filter: brightness(var(--brightness-down));
            }

            input[type="range"]:disabled {
            	filter: grayscale(1);
            	opacity: 0.3;
            	cursor: not-allowed;
            }

            /* base styling for every component */
            input[type="range"],
            input[type="range"]::-webkit-slider-runnable-track,
            input[type="range"]::-webkit-slider-thumb {
            	-webkit-appearance: none;
            	transition: all ease 100ms;
            	height: var(--thumb-height);
            }

            /* styling for the thumb */
            input[type="range"]::-webkit-slider-thumb {
                /* styles the thumb */
                width: var(--thumb-height);
            	background-color: currentColor;
            	border-radius: var(--thumb-height);
            }
            
        </style>
        <!-- color needed for later #154CEA -->

        <!-- Outfit Font-Family Link -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    
    <body
        class="w-full h-screen pb-1 flex flex-col
        text-center font-[outfit]
        bg-linear-to-br from-blue-500 to-white bg-cover bg-fixed"
    >
        <!-- file inputs -->
        <input id="audio-file-input" type="file" onchange="getAudioFiles(false, event)" multiple hidden />
        <input id="image-file-input" type="file" onchange="getImageFile(event)" hidden />

        <header class="flex justify-around items-center gap-40">
            <!-- Logo -->
            <img id="logo" src="Images/crescendo_logo.png" class="w-80" />

            <!-- Drag & Drop -->
            <div
                id="drop-zone"
                class="w-80 h-20 hover:cursor-pointer
                flex flex-col items-center justify-center
                bg-[#FFFFFF26] hover:bg-[#FFFFFF1A]
                border-blue-700 border-2 border-dashed rounded-3xl"
            >
                
                <p class="text-sm text-blue-700 font-semibold">Drag and drop files here or click to browse</p>
                
            </div>

            <!-- Music Visualizer (Not Started Yet)-->
            <div
                id="music-visualizer"
                class="w-80 h-20 grid place-items-center bg-[#FFFFFF1A] rounded-3xl"
            >
                
                <p class="text-sm text-blue-700 font-semibold">Music Visualizer</p>
                
            </div>
            
        </header>

        <!-- kebab menu connecting to the kebabBtn -->
        <aside
            id="kebab-menu"
            class="w-48 z-90 py-2 hidden absolute
            text-blue-600/80 font-medium
            bg-linear-to-br from-[#3F81FE] to-[#75A4FE] shadow-lg rounded-md
            transition-all duration-200 opacity-0 -translate-x-2"
        ></aside>

        <!-- menu overlay for changing aspects of songs and playlists -->
        <aside
            id="modify-menu"
            class="w-100 h-100 z-100 py-2 pz-4 hidden
            fixed top-[50%] left-[50%] -translate-1/2
            bg-linear-to-br from-blue-600 to-white shadow-lg rounded-lg
            transition-all duration-200 opacity-0"
        ></aside>

        <!-- menu overlay for adding songs to playlists-->
        <aside
            id="add-to-playlist-menu"
            class="w-175 z-100 py-2 pz-4 hidden overflow-auto
            flex flex-col items-center gap-y-2
            fixed top-[50%] left-[50%] -translate-1/2
            bg-linear-to-br from-blue-600 to-white shadow-lg rounded-lg
            transition-all duration-200 opacity-0"
        ></aside>

        <!-- 3-Box Flexbox Layout -->
        <main class="flex-1 flex justify-evenly gap-2.5 ml-2.5 mr-2.5 mb-1.5 text-left whitespace-nowrap overflow-hidden">
            
            <!-- Playlists -->
            <section
                id="playlists-el"
                class="basis-1/4 min-h-0 overflow-auto bg-blue-600/40 rounded-xl"
            >
                
                <header class="w-full h-20 sticky top-0 left-0 z-10 bg-linear-to-b from-blue-600 to-inherit flex items-center gap-3">
                    
                    <h2 class="mb-5 pl-5 pt-2.5 text-5xl text-blue-700 font-bold">Playlists</h2>
                    
                    <img
                        id="add-btn"
                        src="Images/addBtn.svg"
                        class="w-10 hover:w-11 hover:-ml-0.5 active:opacity-75 active:w-10 active:ml-0 transition-all duration-150"
                        onclick="addNewPlaylist()""
                    />
                    
                </header>
                
            </section>

            <!-- Songs -->
            <section
                id="songs-el"
                class="basis-1/2 min-h-0 overflow-auto bg-blue-600/40 rounded-xl"
            >
                
                <header class="w-full h-20 sticky top-0 left-0 z-10 bg-linear-to-b from-blue-600 to-inherit">
                    
                    <h2 class="mb-5 pl-5 pt-2.5 text-5xl text-blue-700 font-bold">Songs</h2>

                    <!-- ADD A SEARCH BAR HERE -->
                    <!-- <input id="search-bar" type="text" /> -->
                </header>
                
            </section>

            <!-- Currently Playing Song -->
            <section
                id="now-playing-container"
                class="basis-1/4 h-full overflow-auto bg-blue-600/40 rounded-xl text-center flex flex-col"
            >
                
                <header class="w-full h-20 sticky top-0 left-0 z-10 bg-linear-to-b from-blue-600 to-inherit">
                    
                    <h2 class="mb-5 pl-5 pt-2.5 text-5xl text-blue-700 font-bold">Now Playing</h2>
                    
                </header>
                
                <div id="now-playing-el" class="flex-1 flex flex-col items-center">
                    
                    <img id="playing-song-img" src="Images/music_note.png" class="h-60"/>
                    
                    <p id="playing-song-name" onclick="playSong('playing-song-play-btn')"
                        class="font-medium text-3xl text-blue-700 active:opacity-75">No Song Selected</p>
                
                    <p id="playing-song-artist" class="font-medium text-xl text-blue-600">...</p>

                    <div class="w-full h-10 py-2 flex justify-center items-center">
                        <!-- ADD THE SHUFFLE BUTTON, NEXT/PREVIOUS SONG BUTTONS, AND LOOP BUTTON HERE -->
                        <!-- LOOK AT SPOTIFY FOR REFERENCE -->
                        
                        <!-- <img id="suffle-btn" src="Images/shuffleBtn.svg" onclick="enableShuffle()"/> -->
                        
                        <!-- <img id="previous-btn" src="Images/previousBtn.svg" onclick="playPreviousSong()"/> -->
                        
                        <img id="playing-song-play-btn" src="Images/playBtn.png" onclick="playSong(this.id)"
                            class="w-7.5 hover:w-8.5 hover:-mt-0.25 active:opacity-75 active:w-7.5 active:mt-0 transition-all duration-200"
                        />
                        
                        <img id="next-btn" src="Images/nextBtn.svg" onclick="playNextSong()"
                            class="w-7.5"/>

                        <!-- <img id="loop-btn" src="Images/loopBtn.svg" onclick="enableLoop()"/> -->
    
                    </div>
                    <div id="time-slider-container" class="w-[80%] h-10 flex justify-around items-center relative">
                        
                        <p id="current-time-text" class="text-gray-500 absolute left-[5%] top-[50%] -translate-1/2">0</p>
                        
                        <input type="range" width="50%" id="time-slider" min="0" max="1000" value="0" step="0" disabled/>
                        
                        <p id="duration-text" class="text-gray-500 absolute left-[95%] top-[50%] -translate-1/2">0</p>
                        
                    </div>
                </div>
                
                <audio id="audio-el" src="" class="mt-5"></audio>
                
            </section>
        </main>

        <!-- Javascript -->
        <script defer src="script.js"></script>
    </body>
</html>
