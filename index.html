<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crescendo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="text-center bg-linear-to-br from-blue-600 to-indigo-800">
    <h1 id="title" class="text-7xl text-blue-800">Crescendo</h1>

    <!-- Drag & Drop -->
    <div id="drop-zone"
         class="w-80 h-20 m-auto grid place-items-center
                bg-blue-500/60 hover:bg-blue-500/35
                border-blue-700 border-2 border-dashed rounded-3xl
                hover:cursor-pointer">
        <p class="text-sm text-blue-700">Drag and drop files here or click to browse</p>
    </div>
    <input id="file-input" type="file" multiple hidden>

    <!-- Playlist & Songs -->
    <div class="flex flex-row">
        <div id="playlists-el" class="w-80 h-screen">
            <h2 class="text-4xl text-blue-800 ml-20">Playlists</h2>
        </div>
        <div id="songs-el" class="w-150 h-screen">
            <h2 class="text-4xl text-blue-800 ml-75">Songs</h2>
        </div>
    </div>

    <!-- Main Script -->
    <script defer src="script.js"></script>
</body>
</html>
