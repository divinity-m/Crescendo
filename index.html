<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Crescendo</title>
    <link rel="icon" type="image/x-icon" href="Images/crescendo_icon.png" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="text-center bg-linear-to-br from-blue-500 to-blue-600">
    <div class="flex justify-start items-center">
        <!-- Logo -->
        <img id="logo" src="Images/crescendo_logo.png" class="w-80">
        
        <!-- Drag & Drop -->
        <div id="drop-zone"
             class="w-80 h-20 ml-50 grid place-items-center
                    bg-blue-500/60 hover:bg-blue-500/35
                    border-blue-700 border-2 border-dashed rounded-3xl
                    hover:cursor-pointer">
            <p class="text-sm text-blue-700">Drag and drop files here or click to browse</p>
        </div>
        <input id="file-input" type="file" multiple hidden>

        <!-- Music Visualizer (Not Started Yet)-->
    </div>
    <br>

    <!-- Playlists & Songs -->
    <div class="flex gap-2.5 text-left">
        <div id="playlists-el" class="w-[30%] h-screen bg-blue-600/50 rounded-xl ml-2.5">
            <h2 class="text-5xl text-blue-800 mb-5 pl-5 pt-2.5">Playlists</h2>
            <div id="Songs-playlist"
                class="h-18 pl-5 text-3xl
                text-blue-800 hover:text-blue-800/80
                hover:bg-blue-600/80
                flex items-center gap-3">
                <img src="Images/music_note.png" class="w-15 h-15">
                <p>Songs</p>
                <img src="Images/playBtn.png" class="w-5 h-5">
            </div>
        </div>
        <div id="songs-el" class="w-[60%] h-screen bg-blue-600/50 rounded-xl">
            <h2 class="text-5xl text-blue-800 mb-5 pl-5 pt-2.5">Songs</h2>
            <!-- <audio src="Audio/interstellar - pandora., chillwithme, & cødy.mp3" controls> test song </audio> -->
        </div>
    </div>

    <!-- Main Script -->
    <script defer src="script.js"></script>
</body>
</html>
