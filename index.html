<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crescendo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-blue-800">
    <h1 id="title" class="text-7xl">Crescendo</h1>

    <!-- Drag & Drop -->
    <div id="drop-zone" class="w-50 h-30 bg-gray-400">
        <h3 class="text-3xl">Drag and drop files here or click to browse</h3>
    </div>
    <input type="file" id="file-input" multiple hidden>

    <!-- Playlist & Songs -->
    <div class="flex flex-row">
        <div id="playlists" class="text-4xl bg-linear-to-t from-blue-500 to-indigo-500">
            <h2>Playlists</h2>
        </div>
        <div id="songs" class="text-4xl bg-linear-to-t from-blue-500 to-indigo-500">
            <h2>Songs</h2>
        </div>
    </div>

    <!-- Main Script -->
    <script defer src="script.js"></script>
</body>
</html>
