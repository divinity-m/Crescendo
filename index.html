<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crescendo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="text-center bg-linear-to-br from-blue-500 to-blue-600">
    <h1 id="title" class="text-7xl text-blue-700">Crescendo</h1>
    <hr class="text-blue-600 pb-5 mt-4">
    
    <!-- Drag & Drop -->
    <div id="drop-zone"
         class="w-80 h-20 m-auto grid place-items-center
                bg-blue-500/60 hover:bg-blue-500/35
                border-blue-700 border-2 border-dashed rounded-3xl
                hover:cursor-pointer">
        <p class="text-sm text-blue-700">Drag and drop files here or click to browse</p>
    </div>
    <input id="file-input" type="file" multiple hidden>
    <hr class="text-blue-600 pb-5 mt-5">

    <!-- Playlist & Songs -->
    <div class="flex flex-row">
        <div id="playlists-el" class="w-80 h-screen">
            <h2 class="text-5xl text-blue-800 mb-5">Playlists</h2>
            <div id="Songs-playlist"
                class="w-100 h-18 text-3xl
                text-blue-800 hover:text-blue-800/60
                bg-blue-600/60 hover:bg-blue-600/35
                flex flex-row items-center gap-3
                border-blue-600 border-3 border-solid rounded-3xl">
                <img src="Images/music_note.png" class="w-15 h-15">
                <p>Songs</p>
                <img src="Images/playBtn.png" class="w-5 h-5">
            </div>
        </div>
        <div id="songs-el" class="w-150 h-screen">
            <h2 class="text-5xl text-blue-800 mb-5">Songs</h2>
            <!-- <audio src="Audio/interstellar - pandora., chillwithme, & cødy.mp3" controls> test song </audio> -->
        </div>
    </div>

    <!-- Main Script -->
    <script defer src="script.js"></script>
</body>
</html>
