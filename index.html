<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Crescendo</title>
        <link rel="icon" type="image/x-icon" href="Images/crescendo_icon.png" />

        <!-- Tailwind CSS -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style type="text/tailwindcss"></style>
        <!-- color needed for later #154CEA -->

        <!-- Outfit Font-Family -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body
        class="w-full h-screen flex flex-col pb-1 text-center font-[outfit] bg-linear-to-br from-blue-500 to-white bg-cover bg-fixed"
    >
        <!-- file inputs -->
        <input id="audio-file-input" type="file" multiple hidden />
        <input id="image-file-input" type="file" hidden />

        <header class="flex justify-around items-center gap-40">
            <!-- Logo -->
            <img id="logo" src="Images/crescendo_logo.png" class="w-80" />

            <!-- Drag & Drop -->
            <div
                id="drop-zone"
                class="w-80 h-20 hover:cursor-pointer flex flex-col items-center justify-center bg-[#FFFFFF26] hover:bg-[#FFFFFF1A] border-blue-700 border-2 border-dashed rounded-3xl"
            >
                <p class="text-sm text-blue-700 font-semibold">
                    Drag and drop files here or click to browse
                </p>
            </div>

            <!-- Music Visualizer (Not Started Yet)-->
            <div
                id="music-visualizer"
                class="w-80 h-20 grid place-items-center bg-[#FFFFFF1A] rounded-3xl"
            >
                <p class="text-sm text-blue-700 font-semibold">Music Visualizer</p>
            </div>
        </header>

        <!-- kebab menu connecting to the editBtn -->
        <aside
            id="kebab-menu"
            class="w-48 z-90 py-2 hidden absolute text-blue-600/80 bg-linear-to-br from-[#3F81FE] to-[#75A4FE] shadow-lg rounded-md transition-all duration-200 opacity-0 -translate-x-2"
        ></aside>

        <!-- menu overlay for changing aspects of songs and playlists -->
        <aside
            id="modify-menu"
            class="w-100 h-100 z-100 py-2 pz-4 hidden fixed top-[50%] left-[50%] -translate-1/2 bg-linear-to-br from-blue-600 to-white shadow-lg rounded-lg transition-all duration-200 opacity-0"
        ></aside>

        <!-- menu overlay for adding songs to playlists-->
        <aside
            id="add-to-playlist-menu"
            class="w-175 z-100 py-2 pz-4 hidden overflow-auto flex flex-col items-center gap-y-2 fixed top-[50%] left-[50%] -translate-1/2 bg-linear-to-br from-blue-600 to-white shadow-lg rounded-lg transition-all duration-200 opacity-0"
        ></aside>

        <!-- 3-Box Flexbox Layout -->
        <main
            class="flex-1 flex justify-evenly text-left gap-2.5 ml-2.5 mr-2.5 overflow-hidden mb-1.5"
        >
            <!-- Playlists -->
            <section
                id="playlists-el"
                class="basis-1/4 bg-blue-600/40 rounded-xl overflow-auto min-h-0"
            >
                <header
                    class="h-20 sticky top-0 z-10 bg-linear-to-b from-blue-600 to-inherit flex items-center gap-3"
                >
                    <h2 class="mb-5 pl-5 pt-2.5 text-5xl text-blue-700 font-bold">
                        Playlists
                    </h2>
                    <img
                        id="add-btn"
                        src="Images/addBtn.png"
                        class="w-10 hover:w-11 hover:-ml-0.5"
                        onclick="addNewPlaylist()"
                        onmousedown="fadeBtn('add-btn')"
                        onmouseup="unfadeBtn('add-btn')"
                        ondragleave="unfadeBtn('add-btn')"
                        ondrop="unfadeBtn('add-btn')"
                    />
                </header>
            </section>

            <!-- Songs -->
            <section
                id="songs-el"
                class="basis-1/2 bg-blue-600/40 rounded-xl overflow-auto min-h-0"
            >
                <header
                    class="h-20 sticky top-0 z-10 bg-linear-to-b from-blue-600 to-inherit"
                >
                    <h2 class="mb-5 pl-5 pt-2.5 text-5xl text-blue-700 font-bold">
                        Songs
                    </h2>
                </header>
            </section>

            <!-- Currently Playing Song -->
            <section
                id="now-playing-container"
                class="basis-1/4 bg-blue-600/40 rounded-xl overflow-auto min-h-0 text-center"
            >
                <header
                    class="h-20 sticky top-0 z-10 bg-linear-to-b from-blue-600 to-inherit rounded-xl"
                >
                    <h2 class="mb-5 pl-5 pt-2.5 text-5xl text-blue-700 font-bold">
                        Now Playing
                    </h2>
                </header>
                <div id="now-playing-el" class="flex flex-col items-center"></div>
                <audio id="audio-el" src="" class="hidden"></audio>
            </section>
        </main>

        <!-- Main Script -->
        <script defer src="script.js"></script>
    </body>
</html>
