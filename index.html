<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Crescendo</title>
    <link rel="icon" type="image/x-icon" href="Images/crescendo_icon.png" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss"></style>
    <!-- #154CEA -->

    <!-- Outfit Font-Family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="w-full h-fit text-center font-[outfit] bg-linear-to-br from-blue-500 to-white bg-cover bg-fixed"
  >
    <header class="flex justify-around items-center gap-40">
      <!-- Logo -->
      <img id="logo" src="Images/crescendo_logo.png" class="w-80" />

      <!-- Drag & Drop -->
      <div
        id="drop-zone"
        class="w-80 h-20 grid place-items-center bg-[#FFFFFF26] hover:bg-[#FFFFFF1A] border-blue-700 border-2 border-dashed rounded-3xl hover:cursor-pointer"
      >
        <p class="text-sm text-blue-700 font-bold">
          Drag and drop files here or click to browse
        </p>
      </div>
      <input id="file-input" type="file" multiple hidden />

      <!-- Music Visualizer (Not Started Yet)-->
      <div
        id="music-visualizer"
        class="w-80 h-20 grid place-items-center bg-[#FFFFFF1A] rounded-3xl"
      >
        <p class="text-sm text-blue-700">Music Visualizer</p>
      </div>
    </header>
    <br />

    <!-- kebab menu for the triple dots button -->
    <div
      id="kebab-menu"
      class="w-48 z-50 py-2 hidden absolute text-blue-600/80
             bg-linear-to-br from-[#3F81FE] to-[#75A4FE] shadow-lg rounded-md
             transition-all duration-200 opacity-0 -translate-x-2"
    ></div>

    <!-- 3-Box Flexbox Layout -->
    <div class="flex justify-evenly text-left gap-2.5 ml-2.5 mr-2.5">
      <!-- Playlists -->
      <section
        id="playlists-el"
        class="basis-1/4 h-screen bg-blue-600/40 rounded-xl overflow-y-auto"
      ></section>

      <!-- Songs -->
      <section
        id="songs-el"
        class="basis-1/2 h-screen bg-blue-600/40 rounded-xl overflow-y-auto"
      ></section>

      <!-- Currently Playing Song -->
      <section class="basis-1/4 h-screen text-center bg-blue-600/40 rounded-xl overflow-y-auto">
        <header class="h-20 sticky top-0 z-1 bg-linear-to-b from-blue-600 to-inherit rounded-xl">
          <h2
            class="mb-5 pl-5 pt-2.5 text-5xl text-blue-700 hover:text-blue-700/80 font-bold"
          >
            Now Playing
          </h2>
        </header>
        <div
          id="now-playing-el"
          class="flex flex-col justify-center items-center"
        ></div>
        <audio id="audio-el" src="" class="hidden"></audio>
      </section>
    </div>

    <!-- Main Script -->
    <script defer src="script.js"></script>
  </body>
</html>
