<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Crescendo</title>
    <link rel="icon" type="image/x-icon" href="Images/crescendo_icon.png" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Outfit Font-Family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="text-center font-[outfit] bg-linear-to-br from-blue-400 to-blue-500">
    <div class="flex justify-around items-center gap-40">
        <!-- Logo -->
        <img id="logo" src="Images/crescendo_logo.png" class="w-80">
        
        <!-- Drag & Drop -->
        <div id="drop-zone"
             class="w-80 h-20 grid place-items-center
                    bg-blue-500/60 hover:bg-blue-500/35
                    border-blue-700 border-2 border-dashed rounded-3xl
                    hover:cursor-pointer">
            <p class="text-sm text-blue-700">Drag and drop files here or click to browse</p>
        </div>
        <input id="file-input" type="file" multiple hidden>

        <!-- Music Visualizer (Not Started Yet)-->
        <div id="music-visualizer" class="w-80 h-20 grid place-items-center bg-blue-600/40 rounded-3xl">
            <p class="text-sm text-blue-700">Music Visualizer</p>
        </div>
    </div>
    <br>

    <div class="flex justify-evenly text-left gap-2.5 ml-2.5 mr-2.5">
        <!-- Playlists -->
        <div id="playlists-el" class="basis-1/4 h-screen bg-blue-600/40 rounded-xl">
            <div class="flex items-center gap-3">
                <h2 class="text-5xl text-blue-700 font-bold mb-5 pl-5 pt-2.5">Playlists</h2>
                <img src="Images/addBtn.png" class="w-10 h-10">
            </div>
            <div id="Songs-playlist" class="h-18 pl-5 flex items-center gap-3 hover:bg-blue-600/20">
                <img src="Images/music_note.png" class="w-15 h-15 p-1 bg-blue-600/60 rounded-md">
                <p class="text-3xl text-blue-700 hover:text-blue-700/80">Songs</p>
                <img src="Images/playBtn.png" class="w-7.5 h-7.5 hover:w-8 hover:h-8 hover:ml-[-1.5px] hover:mt-[-1.5px]">
            </div>
        </div>
        
        <!-- Songs -->
        <div id="songs-el" class="basis-1/2 h-screen bg-blue-600/40 rounded-xl">
            <h2 class="text-5xl text-blue-700 font-bold mb-5 pl-5 pt-2.5">Songs</h2>
            <!-- <audio src="Audio/interstellar - pandora., chillwithme, & cødy.mp3" controls> test song </audio> -->
        </div>
        
        <!-- Current Playing Song -->
        <div id="current-playing-el" class="basis-1/4 h-screen bg-blue-600/40 rounded-xl">
            <h2 class="text-5xl text-blue-700 font-bold mb-5 pl-5 pt-2.5">Currently Playing</h2>
        </div>
    </div>

    <!-- Main Script -->
    <script defer src="script.js"></script>
</body>
</html>
